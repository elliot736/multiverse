services:
  app:
    build:
      context: .
      target: build
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://multiverse:multiverse@postgres:5432/multiverse
      NODE_ENV: production
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: multiverse
      POSTGRES_PASSWORD: multiverse
      POSTGRES_DB: multiverse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multiverse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
